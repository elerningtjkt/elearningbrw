<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login | TJKT Online</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
* { box-sizing: border-box; font-family:'Inter', sans-serif; }

body {
  margin:0;
  min-height:100vh;
  background:#f0f4f8;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-container {
  display:flex;
  flex-direction:row;
  width:900px;
  max-width:95%;
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.login-form {
  flex:1;
  padding:60px 40px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  position:relative;
}

.login-form .logo {
  font-size:28px;
  font-weight:700;
  color:#2563eb;
  margin-bottom:6px;
}

.login-form .sub {
  font-size:14px;
  color:#6b7280;
  margin-bottom:36px;
}

.login-form h3 {
  margin:0 0 10px;
  font-weight:600;
  color:#111827;
}

.login-form p {
  font-size:14px;
  color:#6b7280;
  margin-bottom:30px;
}

.input-group {
  position:relative;
  margin-bottom:20px;
}

.input-group i {
  position:absolute;
  top:50%;
  left:14px;
  transform:translateY(-50%);
  color:#9ca3af;
  font-size:16px;
}

.input-group input {
  width:100%;
  padding:14px 14px 14px 42px;
  border-radius:12px;
  border:1px solid #e5e7eb;
  font-size:14px;
  transition:border 0.3s;
}

.input-group input:focus {
  outline:none;
  border-color:#2563eb;
}

.forgot {
  font-size:12px;
  text-align:right;
  margin-bottom:30px;
}

.forgot a {
  color:#2563eb;
  text-decoration:none;
  transition:color 0.2s;
}

.forgot a:hover { color:#1e40af; }

.btn-login {
  background:#2563eb;
  color:#fff;
  border:none;
  padding:14px;
  border-radius:14px;
  font-weight:600;
  cursor:pointer;
  transition: background 0.3s;
  position:relative;
}

.btn-login:hover {
  background:#1e40af;
}

.btn-login:disabled {
  background:#93c5fd;
  cursor:not-allowed;
}

.loading-spinner {
  border:3px solid #fff;
  border-top:3px solid rgba(255,255,255,0.5);
  border-radius:50%;
  width:18px;
  height:18px;
  animation: spin 1s linear infinite;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:none;
}

@keyframes spin { 100% { transform:translate(-50%,-50%) rotate(360deg); } }

.notification {
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 20px;
  border-radius:12px;
  font-size:14px;
  display:none;
  width:90%;
  text-align:center;
}

.notification.success { background:#d1fae5; color:#065f46; }
.notification.error { background:#fee2e2; color:#991b1b; }

/* Visual side */
.login-visual {
  flex:1;
  background:linear-gradient(135deg,#2563eb,#1e40af);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  flex-direction:column;
  padding:40px;
  text-align:center;
}

.login-visual h2 {
  font-size:32px;
  font-weight:700;
  margin-bottom:12px;
}

.login-visual p {
  font-size:16px;
  line-height:1.6;
  max-width:220px;
  margin:0 auto 24px;
}

.login-visual .icons div {
  background:rgba(255,255,255,0.18);
  border-radius:14px;
  padding:16px;
  margin-bottom:14px;
  font-size:16px;
  width:180px;
}

/* Responsive */
@media(max-width:900px){
  .login-container{ flex-direction:column; }
  .login-visual, .login-form{ width:100%; padding:40px 20px; }
}
</style>
</head>

<body>

<div class="login-container">

  <!-- Form side -->
  <div class="login-form">
    <div class="logo">E-Learning TJKT</div>
    <div class="sub">Teknik Jaringan Komputer & Telekomunikasi</div>

    <div class="notification" id="notification"></div>

    <h3>Selamat Datang</h3>
    <p>Masukkan akun Anda untuk mengakses materi pembelajaran digital</p>

    <div class="input-group">
      <i class="fa-solid fa-user"></i>
      <input type="text" id="username" placeholder="Username">
    </div>

    <div class="input-group">
      <i class="fa-solid fa-lock"></i>
      <input type="password" id="password" placeholder="Password">
    </div>

    <div class="forgot">
      <a href="#">Lupa Password?</a>
    </div>

    <button class="btn-login" id="loginBtn">
      Sign In
      <div class="loading-spinner" id="spinner"></div>
    </button>
  </div>

  <!-- Visual side -->
  <div class="login-visual">
    <h2>Network Infrastructure</h2>
    <p>Manajemen data & layanan berbasis jaringan</p>
    <div class="icons">
      <div>🖥️ Server</div>
      <div>🌐 Switch & Router</div>
      <div>📡 Telekomunikasi</div>
    </div>
  </div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwz652bXQyXnVRrScVmKaj-O48hsmDxAuVBTaludoJENYhT6z1aOkFbaqXS1OHyddYR5w/exec"; // Ganti dengan URL Web App Google Apps Script

const btnLogin = document.getElementById("loginBtn");
const spinner = document.getElementById("spinner");
const notification = document.getElementById("notification");

function showNotification(message, type) {
  notification.textContent = message;
  notification.className = "notification " + type;
  notification.style.display = "block";
  setTimeout(() => { notification.style.display = "none"; }, 4000);
}

btnLogin.addEventListener("click", login);

function login() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!username || !password) {
    showNotification("Username dan password wajib diisi!", "error");
    return;
  }

  btnLogin.disabled = true;
  spinner.style.display = "block";

  const formData = new FormData();
  formData.append("username", username);
  formData.append("password", password);

  fetch(SCRIPT_URL, {
    method: "POST",
    body: formData
  })
  .then(res => res.json())
  .then(data => {
    btnLogin.disabled = false;
    spinner.style.display = "none";

    if (data.status === "success") {
      localStorage.setItem("nama", data.nama);
      localStorage.setItem("role", data.role);
      showNotification("Login berhasil! Mengarahkan ke dashboard...", "success");

      setTimeout(() => {
        if (data.role === "admin") location.href = "admin/dashboardadmin.html";
        else if (data.role === "guru") location.href = "guru/dashboardguru.html";
        else if (data.role === "siswa") location.href = "siswa/dashboardsiswa.html";
        else showNotification("Role tidak dikenali", "error");
      }, 1000);

    } else {
      showNotification(data.message || "Login gagal", "error");
    }
  })
  .catch(err => {
    btnLogin.disabled = false;
    spinner.style.display = "none";
    showNotification("Gagal terhubung ke server", "error");
    console.error(err);
  });
}
</script>

</body>
</html>
