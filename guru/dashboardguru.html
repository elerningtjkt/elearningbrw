<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Guru | E-Learning TJKT</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: #f0f4f8;
    color: #111827;
    overflow-x: hidden;
  }

  /* ========================================
     THEME VARIABLES
  ======================================== */
  :root {
    --primary: #2563eb;
    --primary-dark: #1e40af;
    --primary-light: #eff6ff;
    --primary-soft: #3b82f6;
    --white: #ffffff;
    --black: #111827;
    --gray-50: #f8fafc;
    --gray-100: #f0f4f8;
    --gray-200: #e5e7eb;
    --gray-300: #d1d5db;
    --gray-400: #9ca3af;
    --gray-500: #6b7280;
    --gray-600: #4b5563;
    --gray-700: #374151;
    --gray-800: #1f2937;
    --gray-900: #111827;
    --success: #10b981;
    --warning: #f59e0b;
    --error: #dc2626;
    --error-dark: #b91c1c;
    --error-light: #fef2f2;
    --info: #3b82f6;
    --bg-page: #f0f4f8;
    --bg-card: #ffffff;
    --bg-sidebar: #ffffff;
    --bg-hover: #eff6ff;
    --border-color: #e5e7eb;
    --border-radius-sm: 12px;
    --border-radius-md: 16px;
    --border-radius-lg: 20px;
    --border-radius-xl: 30px;
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.02);
    --shadow-md: 0 1px 3px rgba(0, 0, 0, 0.05);
    --shadow-lg: 0 4px 12px rgba(0, 0, 0, 0.08);
    --transition-fast: 0.2s ease;
    --transition-normal: 0.3s ease;
  }

  /* Layout */
  .app-container {
    display: flex;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    width: 280px;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border-color);
    position: fixed;
    left: 0;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    z-index: 100;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: transform var(--transition-normal);
  }

  .sidebar-top {
    flex: 1;
  }

  .sidebar-header {
    padding: 28px 24px;
    border-bottom: 1px solid var(--border-color);
    margin-bottom: 24px;
  }

  .sidebar-header h2 {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--black);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sidebar-header i {
    color: var(--primary);
    font-size: 1.3rem;
  }

  .sidebar-nav {
    list-style: none;
    padding: 0 16px;
    margin-bottom: 32px;
  }

  .sidebar-nav li {
    margin-bottom: 4px;
  }

  .sidebar-nav li a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    text-decoration: none;
    color: var(--gray-500);
    font-weight: 500;
    border-radius: var(--border-radius-sm);
    transition: all var(--transition-fast);
    font-size: 0.9rem;
    cursor: pointer;
  }

  .sidebar-nav li a i {
    width: 20px;
    font-size: 1rem;
  }

  .sidebar-nav li a:hover {
    background: var(--bg-hover);
    color: var(--primary);
  }

  .sidebar-nav li.active a {
    background: var(--bg-hover);
    color: var(--primary);
    font-weight: 600;
  }

  /* User Section in Sidebar */
  .sidebar-user {
    padding: 20px 24px 28px;
    border-top: 1px solid var(--border-color);
    margin-top: auto;
  }

  .user-profile {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    background: var(--gray-50);
    padding: 12px;
    border-radius: var(--border-radius-md);
  }

  .user-avatar {
    width: 44px;
    height: 44px;
    background: var(--primary);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 600;
    font-size: 1.1rem;
  }

  .user-info-sidebar {
    flex: 1;
  }

  .user-info-sidebar .user-name {
    font-weight: 700;
    font-size: 0.9rem;
    color: var(--black);
    margin-bottom: 2px;
  }

  .user-info-sidebar .user-role {
    font-size: 0.7rem;
    color: var(--gray-500);
    font-weight: 500;
  }

  .logout-btn-sidebar {
    width: 100%;
    background: none;
    border: 1px solid var(--border-color);
    padding: 10px 12px;
    border-radius: var(--border-radius-sm);
    font-weight: 600;
    color: var(--error);
    cursor: pointer;
    transition: all var(--transition-fast);
    font-size: 0.8rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--white);
  }

  .logout-btn-sidebar:hover {
    background: var(--error-light);
    border-color: var(--error);
    color: var(--error-dark);
  }

  /* Main Content */
  .main-content {
    flex: 1;
    margin-left: 280px;
    padding: 32px 40px;
  }

  /* Header Area */
  .page-header {
    margin-bottom: 32px;
  }

  .page-header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--black);
    margin-bottom: 6px;
  }

  .page-header p {
    color: var(--gray-500);
    font-size: 0.9rem;
  }

  /* Stats Grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--bg-card);
    border-radius: var(--border-radius-md);
    padding: 24px;
    border: 1px solid var(--border-color);
    transition: all var(--transition-fast);
    box-shadow: var(--shadow-sm);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .stat-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
  }

  .stat-info h3 {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--gray-500);
    margin-bottom: 12px;
  }

  .stat-number {
    font-size: 2rem;
    font-weight: 800;
    color: var(--black);
  }

  .stat-unit {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--gray-400);
    margin-left: 4px;
  }

  .stat-icon {
    width: 52px;
    height: 52px;
    background: var(--primary-light);
    border-radius: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--primary);
    font-size: 1.4rem;
  }

  /* Monitoring Table */
  .monitoring-section {
    background: var(--bg-card);
    border-radius: var(--border-radius-md);
    border: 1px solid var(--border-color);
    overflow: hidden;
    margin-top: 24px;
  }

  .section-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
  }

  .section-header h2 {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--black);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-header h2 i {
    color: var(--primary);
  }

  .search-box {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .search-box input {
    padding: 10px 16px;
    border: 1px solid var(--border-color);
    border-radius: var(--border-radius-sm);
    font-size: 0.85rem;
    width: 250px;
    font-family: 'Inter', sans-serif;
  }

  .search-box input:focus {
    outline: none;
    border-color: var(--primary);
  }

  .refresh-btn {
    background: var(--primary-light);
    border: none;
    padding: 10px 16px;
    border-radius: var(--border-radius-sm);
    color: var(--primary);
    cursor: pointer;
    transition: var(--transition-fast);
    font-weight: 600;
  }

  .refresh-btn:hover {
    background: var(--primary);
    color: white;
  }

  .table-container {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    text-align: left;
    padding: 16px 20px;
    background: var(--gray-50);
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--gray-600);
    border-bottom: 1px solid var(--border-color);
  }

  td {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border-color);
    font-size: 0.85rem;
    color: var(--gray-700);
  }

  tr:hover {
    background: var(--gray-50);
  }

  /* Progress Bar Mini */
  .progress-mini {
    width: 100px;
    height: 6px;
    background: var(--gray-200);
    border-radius: 10px;
    overflow: hidden;
    display: inline-block;
    margin-right: 8px;
  }

  .progress-mini-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--primary-dark));
    border-radius: 10px;
    transition: width 0.3s ease;
  }

  .progress-text {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--primary);
  }

  .badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 600;
  }

  .badge-active {
    background: #d1fae5;
    color: #065f46;
  }

  .badge-inactive {
    background: #fee2e2;
    color: #991b1b;
  }

  .view-btn {
    background: none;
    border: none;
    color: var(--primary);
    cursor: pointer;
    font-size: 1rem;
    padding: 6px 10px;
    border-radius: 8px;
    transition: var(--transition-fast);
  }

  .view-btn:hover {
    background: var(--primary-light);
  }

  /* Loading State */
  .loading-state {
    text-align: center;
    padding: 60px;
    background: var(--bg-card);
    border-radius: var(--border-radius-md);
    border: 1px solid var(--border-color);
  }

  .spinner {
    border: 3px solid var(--gray-200);
    border-top: 3px solid var(--primary);
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* Toast Message */
  .toast-message {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--black);
    color: white;
    padding: 12px 20px;
    border-radius: var(--border-radius-sm);
    font-size: 0.8rem;
    font-weight: 500;
    z-index: 1000;
    animation: slideIn 0.3s ease;
    box-shadow: var(--shadow-lg);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* Modal */
  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    z-index: 1000;
    justify-content: center;
    align-items: center;
  }

  .modal.active {
    display: flex;
  }

  .modal-content {
    background: var(--bg-card);
    border-radius: var(--border-radius-md);
    max-width: 500px;
    width: 90%;
    padding: 28px;
    box-shadow: var(--shadow-xl);
  }

  .modal-content h3 {
    margin-bottom: 16px;
    color: var(--black);
  }

  .modal-content p {
    margin-bottom: 8px;
    color: var(--gray-600);
  }

  .modal-close {
    margin-top: 20px;
    padding: 10px 20px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--border-radius-sm);
    cursor: pointer;
    font-weight: 600;
  }

  /* Mobile Responsive */
  .mobile-menu-toggle {
    display: none;
    position: fixed;
    top: 16px;
    left: 16px;
    background: white;
    border: none;
    padding: 10px;
    border-radius: var(--border-radius-sm);
    z-index: 200;
    cursor: pointer;
    box-shadow: var(--shadow-lg);
  }

  .overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 150;
  }

  @media (max-width: 1024px) {
    .stats-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (max-width: 768px) {
    .mobile-menu-toggle {
      display: block;
    }
    .sidebar {
      transform: translateX(-100%);
    }
    .sidebar.open {
      transform: translateX(0);
    }
    .main-content {
      margin-left: 0;
      padding: 60px 16px 24px 16px;
    }
    .overlay.active {
      display: block;
    }
    .stats-grid {
      grid-template-columns: 1fr;
      gap: 16px;
    }
    .section-header {
      flex-direction: column;
      align-items: stretch;
    }
    .search-box {
      flex-direction: column;
    }
    .search-box input {
      width: 100%;
    }
  }
</style>
</head>
<body>

<div class="app-container">
  <button class="mobile-menu-toggle" id="menuToggleBtn">
    <i class="fas fa-bars"></i>
  </button>
  <div class="overlay" id="overlay"></div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-header">
        <h2><i class="fas fa-graduation-cap"></i> E-Learning TJKT</h2>
      </div>
      <ul class="sidebar-nav">
        <li class="active"><a href="javascript:void(0)" onclick="navigateTo('dashboard')"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
        <li><a href="javascript:void(0)" onclick="navigateTo('materi')"><i class="fas fa-book-open"></i> Materi</a></li>
        <li><a href="javascript:void(0)" onclick="navigateTo('monitoring')"><i class="fas fa-eye"></i> Monitoring Siswa</a></li>
      </ul>
    </div>
    <div class="sidebar-user">
      <div class="user-profile">
        <div class="user-avatar" id="avatarInitial">G</div>
        <div class="user-info-sidebar">
          <div class="user-name" id="sidebarNama">Guru TJKT</div>
          <div class="user-role">Guru Pengajar</div>
        </div>
      </div>
      <button class="logout-btn-sidebar" id="logoutBtnSidebar">
        <i class="fas fa-sign-out-alt"></i> Keluar
      </button>
    </div>
  </div>

  <div class="main-content">
    <div class="page-header">
      <h1>Dashboard Guru</h1>
      <p>Pantau aktivitas belajar siswa dan kelola pembelajaran</p>
    </div>

    <div id="dashboardContent">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Memuat data dashboard...</p>
      </div>
    </div>
  </div>
</div>

<!-- Modal Detail Siswa -->
<div class="modal" id="siswaModal">
  <div class="modal-content">
    <h3><i class="fas fa-user-graduate"></i> Detail Siswa</h3>
    <div id="modalDetail"></div>
    <button class="modal-close" onclick="closeModal()">Tutup</button>
  </div>
</div>

<script>
  // API URL (sesuaikan dengan URL Google Apps Script Anda)
  const API_URL = 'https://script.google.com/macros/s/AKfycbyXlu8fV6GkovhAkwfaYri1zXKwWu0G__6tAImqw5vNIL6zNbXR0L8wIc5y0dINNL1g/exec';
  const PROGRESS_KEY = 'tjkt_siswa_completed_sub_v2';

  // Navigasi antar halaman
  function navigateTo(page) {
    const currentPath = window.location.pathname;
    const isInGuruFolder = currentPath.includes('/guru/');
    
    let targetUrl = '';
    switch(page) {
      case 'dashboard':
        targetUrl = isInGuruFolder ? 'dashboardguru.html' : 'guru/dashboardguru.html';
        break;
      case 'materi':
        targetUrl = isInGuruFolder ? 'materi.html' : 'guru/materi.html';
        break;
      case 'monitoring':
        targetUrl = isInGuruFolder ? 'monitoringsiswa.html' : 'guru/monitoringsiswa.html';
        break;
      default:
        return;
    }
    
    fetch(targetUrl, { method: 'HEAD' })
      .then(response => {
        if (response.ok) {
          window.location.href = targetUrl;
        } else {
          const altUrl = page === 'dashboard' ? 'dashboardguru.html' : 
                         page === 'materi' ? 'materi.html' : 'monitoringsiswa.html';
          window.location.href = altUrl;
        }
      })
      .catch(() => {
        window.location.href = targetUrl;
      });
  }

  // Logout function
  function logout() {
    localStorage.clear();
    sessionStorage.clear();
    
    const possiblePaths = ['../index.html', 'index.html', '/index.html'];
    let attemptCount = 0;
    
    function tryNextPath() {
      if (attemptCount >= possiblePaths.length) {
        window.location.href = '../index.html';
        return;
      }
      
      const path = possiblePaths[attemptCount];
      fetch(path, { method: 'HEAD' })
        .then(response => {
          if (response.ok) {
            window.location.href = path;
          } else {
            attemptCount++;
            tryNextPath();
          }
        })
        .catch(() => {
          attemptCount++;
          tryNextPath();
        });
    }
    
    tryNextPath();
  }

  // Fetch semua materi untuk mendapatkan data sub materi
  async function fetchAllMateri() {
    try {
      const response = await fetch(`${API_URL}?action=getAllMateri`);
      const result = await response.json();
      if(result.status === 'success' && Array.isArray(result.data)) {
        return result.data;
      }
      return [];
    } catch(e) {
      console.error("Error fetch materi:", e);
      return [];
    }
  }

  // Fetch semua siswa (dari localStorage atau API)
  async function fetchSiswaData() {
    // Di sini kita akan mengambil data siswa dari localStorage yang tersimpan saat login
    // Untuk demo, kita buat data dummy yang akan diupdate dengan progress
    const siswaList = JSON.parse(localStorage.getItem('siswa_list') || '[]');
    
    if(siswaList.length === 0) {
      // Data dummy untuk demo
      return [
        { nama: 'Ahmad Fauzi', kelas: 'TJKT 1', nis: '2024001', status: 'active' },
        { nama: 'Budi Santoso', kelas: 'TJKT 1', nis: '2024002', status: 'active' },
        { nama: 'Citra Dewi', kelas: 'TJKT 2', nis: '2024003', status: 'active' },
        { nama: 'Dian Permata', kelas: 'TJKT 2', nis: '2024004', status: 'inactive' },
        { nama: 'Eka Pratama', kelas: 'TJKT 1', nis: '2024005', status: 'active' }
      ];
    }
    
    return siswaList;
  }

  // Mendapatkan progress untuk seorang siswa
  function getSiswaProgress(namaSiswa) {
    const siswaProgressKey = `siswa_progress_${namaSiswa.replace(/\s/g, '_')}`;
    const progress = localStorage.getItem(siswaProgressKey);
    if(progress) {
      try {
        const parsed = JSON.parse(progress);
        return {
          completedSub: parsed.completedSub || 0,
          totalSub: parsed.totalSub || 0,
          percent: parsed.percent || 0
        };
      } catch(e) {
        return { completedSub: 0, totalSub: 0, percent: 0 };
      }
    }
    return { completedSub: 0, totalSub: 0, percent: 0 };
  }

  // Menghitung total sub materi dari semua materi
  async function getTotalSubMateri() {
    const materiData = await fetchAllMateri();
    let totalSub = 0;
    for(let materi of materiData) {
      if(materi.sub_materi && Array.isArray(materi.sub_materi)) {
        totalSub += materi.sub_materi.length;
      }
    }
    return totalSub;
  }

  // Render Dashboard
  async function renderDashboard() {
    const container = document.getElementById('dashboardContent');
    
    try {
      const siswaData = await fetchSiswaData();
      const materiData = await fetchAllMateri();
      const totalSubMateri = await getTotalSubMateri();
      
      // Hitung statistik
      let activeSiswa = 0;
      let totalProgressAll = 0;
      let siswaWithProgress = 0;
      
      const siswaWithProgressData = [];
      
      for(let siswa of siswaData) {
        if(siswa.status === 'active') activeSiswa++;
        
        const progress = getSiswaProgress(siswa.nama);
        progress.siswa = siswa;
        progress.totalSubGlobal = totalSubMateri;
        
        if(totalSubMateri > 0) {
          progress.percent = Math.round((progress.completedSub / totalSubMateri) * 100);
        } else {
          progress.percent = 0;
        }
        
        siswaWithProgressData.push(progress);
        
        if(progress.completedSub > 0 || progress.percent > 0) {
          totalProgressAll += progress.percent;
          siswaWithProgress++;
        }
      }
      
      const avgProgress = siswaWithProgress > 0 ? Math.round(totalProgressAll / siswaWithProgress) : 0;
      const totalMateri = materiData.filter(m => m.id_materi).length;
      
      // Hitung total tugas yang belum dinilai (simulasi)
      const pendingTasks = 5;
      
      const statsHTML = `
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-info">
              <h3><i class="fas fa-users"></i> TOTAL SISWA</h3>
              <div class="stat-number">${siswaData.length}</div>
              <small style="font-size:0.7rem; color:var(--gray-500);">${activeSiswa} aktif</small>
            </div>
            <div class="stat-icon">
              <i class="fas fa-user-graduate"></i>
            </div>
          </div>
          
          <div class="stat-card">
            <div class="stat-info">
              <h3><i class="fas fa-book"></i> MATERI AKTIF</h3>
              <div class="stat-number">${totalMateri}</div>
              <small style="font-size:0.7rem; color:var(--gray-500);">${totalSubMateri} sub materi</small>
            </div>
            <div class="stat-icon">
              <i class="fas fa-folder-open"></i>
            </div>
          </div>
          
          <div class="stat-card">
            <div class="stat-info">
              <h3><i class="fas fa-chart-line"></i> RATA-RATA PROGRESS</h3>
              <div class="stat-number">${avgProgress}%</div>
              <small style="font-size:0.7rem; color:var(--gray-500);">seluruh siswa</small>
            </div>
            <div class="stat-icon">
              <i class="fas fa-chart-simple"></i>
            </div>
          </div>
          
          <div class="stat-card">
            <div class="stat-info">
              <h3><i class="fas fa-clock"></i> TUGAS BELUM DINILAI</h3>
              <div class="stat-number">${pendingTasks}</div>
              <small style="font-size:0.7rem; color:var(--gray-500);">perlu dikoreksi</small>
            </div>
            <div class="stat-icon">
              <i class="fas fa-tasks"></i>
            </div>
          </div>
        </div>
      `;
      
      // Tabel monitoring siswa
      let tableRows = '';
      for(let item of siswaWithProgressData) {
        const percent = item.percent;
        const statusBadge = item.siswa.status === 'active' ? 
          '<span class="badge badge-active">Aktif</span>' : 
          '<span class="badge badge-inactive">Tidak Aktif</span>';
        
        tableRows += `
          <tr>
            <td>${item.siswa.nama}</td>
            <td>${item.siswa.kelas || 'TJKT'}</td>
            <td>${item.siswa.nis || '-'}</td>
            <td>
              <div style="display: flex; align-items: center;">
                <div class="progress-mini">
                  <div class="progress-mini-fill" style="width: ${percent}%;"></div>
                </div>
                <span class="progress-text">${percent}%</span>
              </div>
            </td>
            <td>${item.completedSub} / ${item.totalSubGlobal}</td>
            <td>${statusBadge}</td>
            <td>
              <button class="view-btn" onclick="showSiswaDetail('${item.siswa.nama}', ${percent}, ${item.completedSub}, ${item.totalSubGlobal})">
                <i class="fas fa-eye"></i>
              </button>
            </td>
          </tr>
        `;
      }
      
      const monitoringHTML = `
        <div class="monitoring-section">
          <div class="section-header">
            <h2><i class="fas fa-users"></i> Monitoring Progress Siswa</h2>
            <div class="search-box">
              <input type="text" id="searchInput" placeholder="Cari nama siswa..." onkeyup="filterTable()">
              <button class="refresh-btn" onclick="refreshData()">
                <i class="fas fa-sync-alt"></i> Refresh
              </button>
            </div>
          </div>
          <div class="table-container">
            <table id="siswaTable">
              <thead>
                <tr>
                  <th>Nama Siswa</th>
                  <th>Kelas</th>
                  <th>NIS</th>
                  <th>Progress Belajar</th>
                  <th>Sub Materi Selesai</th>
                  <th>Status</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody id="tableBody">
                ${tableRows}
              </tbody>
            </table>
          </div>
        </div>
      `;
      
      container.innerHTML = statsHTML + monitoringHTML;
      
    } catch(error) {
      console.error(error);
      container.innerHTML = `
        <div style="background: white; border-radius: 16px; padding: 48px; text-align: center;">
          <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: var(--error);"></i>
          <h3 style="margin-top: 16px;">Gagal Memuat Data</h3>
          <p style="color: var(--gray-500);">${error.message}</p>
          <button onclick="location.reload()" style="margin-top: 20px; background: var(--primary); border: none; padding: 10px 24px; border-radius: 30px; color: white; cursor: pointer;">
            <i class="fas fa-sync-alt"></i> Muat Ulang
          </button>
        </div>
      `;
    }
  }
  
  // Filter tabel
  function filterTable() {
    const input = document.getElementById('searchInput');
    const filter = input.value.toLowerCase();
    const table = document.getElementById('siswaTable');
    const rows = table.getElementsByTagName('tr');
    
    for(let i = 1; i < rows.length; i++) {
      const tdNama = rows[i].getElementsByTagName('td')[0];
      if(tdNama) {
        const textValue = tdNama.textContent || tdNama.innerText;
        if(textValue.toLowerCase().indexOf(filter) > -1) {
          rows[i].style.display = '';
        } else {
          rows[i].style.display = 'none';
        }
      }
    }
  }
  
  // Refresh data
  async function refreshData() {
    showToast("Memperbarui data...", 1500);
    await renderDashboard();
    showToast("Data berhasil diperbarui!", 2000);
  }
  
  // Show modal detail siswa
  function showSiswaDetail(nama, percent, completedSub, totalSub) {
    const modal = document.getElementById('siswaModal');
    const modalDetail = document.getElementById('modalDetail');
    
    modalDetail.innerHTML = `
      <p><strong><i class="fas fa-user"></i> Nama:</strong> ${nama}</p>
      <p><strong><i class="fas fa-chart-line"></i> Progress:</strong> ${percent}%</p>
      <p><strong><i class="fas fa-check-circle"></i> Sub Materi Selesai:</strong> ${completedSub} dari ${totalSub}</p>
      <p><strong><i class="fas fa-calendar"></i> Terakhir Aktif:</strong> ${new Date().toLocaleDateString('id-ID')}</p>
    `;
    
    modal.classList.add('active');
  }
  
  function closeModal() {
    const modal = document.getElementById('siswaModal');
    modal.classList.remove('active');
  }
  
  function showToast(msg, duration = 2000) {
    let toast = document.querySelector('.toast-message');
    if(toast) toast.remove();
    const div = document.createElement('div');
    div.className = 'toast-message';
    div.innerHTML = `<i class="fas fa-info-circle"></i> ${msg}`;
    document.body.appendChild(div);
    setTimeout(() => div.remove(), duration);
  }
  
  // Mobile menu handlers
  const sidebarEl = document.getElementById('sidebar');
  const overlayEl = document.getElementById('overlay');
  const menuToggleBtn = document.getElementById('menuToggleBtn');
  function openSidebar() { sidebarEl.classList.add('open'); overlayEl.classList.add('active'); }
  function closeSidebar() { sidebarEl.classList.remove('open'); overlayEl.classList.remove('active'); }
  if(menuToggleBtn) menuToggleBtn.addEventListener('click', openSidebar);
  if(overlayEl) overlayEl.addEventListener('click', closeSidebar);
  
  // Logout
  document.getElementById('logoutBtnSidebar').addEventListener('click', (e) => {
    e.preventDefault();
    logout();
  });
  
  // Auth check & set user info
  const nama = localStorage.getItem('nama');
  const role = localStorage.getItem('role');
  if(role !== 'guru') {
    alert('Akses terbatas untuk guru!');
    window.location.href = '../index.html';
  } else {
    const displayName = nama || 'Guru TJKT';
    document.getElementById('sidebarNama').innerHTML = displayName;
    document.getElementById('avatarInitial').innerHTML = displayName.charAt(0).toUpperCase();
  }
  
  // Load dashboard
  renderDashboard();
</script>

</body>
</html>
