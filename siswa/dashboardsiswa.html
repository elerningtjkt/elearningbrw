<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Siswa | TJKT Online</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
* { box-sizing:border-box; font-family:'Inter',sans-serif; margin:0; padding:0; }
body { background:#f0f4f8; display:flex; min-height:100vh; overflow-x:hidden; }

.sidebar {
  width:250px; background:#1e40af; color:#fff; display:flex; flex-direction:column; transition:width 0.3s;
}
.sidebar h2 { text-align:center; margin:24px 0; font-size:22px; font-weight:700; }
.sidebar ul { list-style:none; padding:0; }
.sidebar ul li { padding:16px 24px; cursor:pointer; display:flex; align-items:center; transition:0.2s; }
.sidebar ul li i { margin-right:12px; }
.sidebar ul li:hover { background:#2563eb; }

.main {
  flex:1; padding:24px; transition:margin-left 0.3s;
}

.header {
  display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;
}
.header h1 { font-size:24px; color:#111827; }
.header button { padding:8px 16px; border:none; border-radius:8px; background:#2563eb; color:#fff; cursor:pointer; font-weight:600; transition:0.3s; }
.header button:hover { background:#1e40af; }

.cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:20px; }
.card { background:#fff; padding:24px; border-radius:16px; box-shadow:0 5px 20px rgba(0,0,0,0.05); transition:transform 0.3s; }
.card:hover { transform:translateY(-6px); }
.card h2 { font-size:18px; margin-bottom:12px; color:#111827; }
.card p { font-size:14px; color:#6b7280; }

@media(max-width:768px){
  .sidebar { width:60px; }
  .cards { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<div class="sidebar">
  <h2>Siswa</h2>
  <ul>
    <li>
      <a href="dashboardsiswa.html" style="text-decoration:none; color:inherit; display:flex; align-items:center;">
        <i class="fa-solid fa-gauge"></i> <span>Dashboard</span>
      </a>
    </li>
    <li>
      <a href="materi.html" style="text-decoration:none; color:inherit; display:flex; align-items:center;">
        <i class="fa-solid fa-book"></i> <span>Materi</span>
      </a>
    </li>
    <li>
      <a href="progresbelajar.html" style="text-decoration:none; color:inherit; display:flex; align-items:center;">
        <i class="fa-solid fa-chart-line"></i> <span>Progres Belajar</span>
      </a>
    </li>
  </ul>
</div>


<div class="main">
  <div class="header">
    <h1>Selamat Datang, <span id="namaUser"></span></h1>
    <button id="logoutBtn">Logout</button>
  </div>

  <div class="cards">
    <div class="card"><h2>Materi Hari Ini</h2><p>3 Materi Baru</p></div>
    <div class="card"><h2>Progres Minggu Ini</h2><p>80%</p></div>
    <div class="card"><h2>Tugas Pending</h2><p>2 Tugas</p></div>
    <div class="card"><h2>Nilai Terbaru</h2><p>87/100</p></div>
  </div>
</div>

<script>
const namaUser = localStorage.getItem('nama');
const roleUser = localStorage.getItem('role');

if(!roleUser || roleUser !== 'siswa'){
  alert('Anda tidak memiliki akses ke halaman ini!');
  window.location.href = "index.html";
} else {
  document.getElementById('namaUser').textContent = namaUser;
}

document.getElementById('logoutBtn').addEventListener('click', () => {
  localStorage.clear();
  window.location.href = "index.html";
});
</script>

</body>
</html>
